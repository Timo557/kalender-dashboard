<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="/kalender-dashboard/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07070f">
<title>Focus</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@200;300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07070f;--surface:#0d0d1a;
  --border:rgba(210,170,80,.13);
  --gold:#d2aa50;--gold-dim:rgba(210,170,80,.4);--gold-glow:rgba(210,170,80,.07);
  --text:#ede8db;--muted:#6d6858;--dim:rgba(237,232,219,.25);
  --red:#b84a44;--green:#3d8f60;--blue:#4a7fb8;
  --ease-out:cubic-bezier(.25,.46,.45,.94);
  --ease-spring:cubic-bezier(.34,1.20,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 420px 320px at 15% 80%,rgba(210,170,80,.028) 0%,transparent 70%),
             radial-gradient(ellipse 380px 280px at 85% 20%,rgba(80,100,180,.022) 0%,transparent 70%),
             radial-gradient(ellipse 300px 400px at 60% 90%,rgba(61,143,96,.018) 0%,transparent 70%);}
.orb{position:fixed;top:-200px;right:-200px;width:550px;height:550px;border-radius:50%;
     background:radial-gradient(circle,rgba(210,170,80,.055) 0%,transparent 65%);pointer-events:none;z-index:0;}

/* ── Loading ── */
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:99;pointer-events:none;}
.ls-content{display:flex;flex-direction:column;align-items:center;gap:.85rem;}
.ls-diamond{font-size:1.5rem;color:var(--gold);opacity:0;animation:ls-di .55s .05s var(--ease-spring) forwards;}
.ls-wordmark{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;letter-spacing:.18em;color:var(--text);line-height:1;opacity:0;animation:ls-ri .5s .28s var(--ease-out) forwards;}
.ls-rule{height:.5px;width:0;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);opacity:0;animation:ls-li .45s .65s var(--ease-out) forwards;}
.ls-status{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:0;animation:ls-fa .35s .95s ease forwards;}
#loading-screen.ls-exit{animation:ls-ex .42s var(--ease-out) forwards;}
@keyframes ls-di{from{opacity:0;transform:scale(.5);}to{opacity:1;transform:scale(1);}}
@keyframes ls-ri{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes ls-li{from{width:0;opacity:0;}to{width:100px;opacity:1;}}
@keyframes ls-fa{from{opacity:0;}to{opacity:1;}}
@keyframes ls-ex{to{opacity:0;transform:translateY(-10px);}}

/* ── Shell ── */
#main-screen{opacity:0;transition:opacity .45s var(--ease-out);}
#main-screen.visible{opacity:1;}
.shell{position:relative;z-index:1;display:grid;grid-template-columns:1fr 276px;grid-template-rows:auto 1fr auto;height:100vh;max-width:1200px;margin:0 auto;padding:1.6rem 2.2rem 1.1rem;gap:0 2rem;}
.hdr      {opacity:0;animation:sh-in .55s var(--ease-out) 0ms   forwards;}
.focus-col{opacity:0;animation:sh-in .55s var(--ease-out) 80ms  forwards;}
.sched-col{opacity:0;animation:sh-in .55s var(--ease-out) 155ms forwards;}
.footer   {opacity:0;animation:sh-in .55s var(--ease-out) 215ms forwards;}
@keyframes sh-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ── Header ── */
.hdr{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding-bottom:.9rem;border-bottom:.5px solid var(--border);margin-bottom:1.25rem;}
.hdr-left{display:flex;align-items:flex-end;gap:1.25rem;}
.clock{font-family:'JetBrains Mono',monospace;font-size:clamp(2rem,3.8vw,2.9rem);font-weight:200;color:var(--gold);line-height:1;letter-spacing:-1.5px;}
.clock-s{font-size:.5em;opacity:.55;vertical-align:middle;letter-spacing:0;}
.hdr-date{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding-bottom:4px;}
.hdr-right{display:flex;align-items:center;gap:1.25rem;}
.pills{display:flex;gap:.28rem;align-items:center;}
.pill{width:5px;height:5px;border-radius:50%;background:rgba(210,170,80,.12);transition:background .5s var(--ease-out),transform .4s var(--ease-spring);}
.pill.done{background:var(--green);opacity:.7;}
.pill.active{background:var(--gold);transform:scale(1.45);}
.day-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:.25rem;}
.day-pct{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.1em;color:var(--muted);}
.day-track{width:120px;height:1.5px;background:rgba(210,170,80,.06);border-radius:2px;overflow:hidden;}
.day-fill{height:100%;background:linear-gradient(90deg,rgba(210,170,80,.15),rgba(210,170,80,.5));border-radius:2px;transition:width 1s var(--ease-out);}

/* ── Focus column ── */
.focus-col{display:flex;flex-direction:column;gap:.9rem;min-height:0;min-width:0;}

/* ── Current card ── */
.cur-card{background:var(--gold-glow);border:.5px solid rgba(210,170,80,.18);border-radius:18px;padding:2rem 2.2rem;position:relative;overflow:hidden;transition:border-color .6s var(--ease-out),background .6s var(--ease-out);}
.cur-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),rgba(210,170,80,.1));border-radius:18px 0 0 18px;transition:background .6s var(--ease-out);}
.cur-card::after{content:'';position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg,rgba(210,170,80,.025) 0%,transparent 50%);pointer-events:none;}
.cur-card.free   {border-color:rgba(210,170,80,.07);}
.cur-card.urgent {border-color:rgba(184,74,68,.35);}
.cur-card.urgent::before{background:linear-gradient(180deg,var(--red),rgba(184,74,68,.1));}
.cur-card.eod    {border-color:rgba(61,143,96,.3);}
.cur-card.eod::before{background:linear-gradient(180deg,var(--green),rgba(61,143,96,.1));}
.cur-card.pausing{border-color:rgba(61,143,96,.2);padding:0;background:transparent;}
.cur-card.pausing::before,.cur-card.pausing::after{display:none;}
.cur-card.manual {border-color:rgba(74,127,184,.4);background:rgba(74,127,184,.04);}
.cur-card.manual::before{background:linear-gradient(180deg,var(--blue),rgba(74,127,184,.08));}
.cur-card.card-exit {opacity:0;transform:translateY(-5px);transition:opacity .18s ease,transform .18s ease!important;}
.cur-card.card-enter{opacity:0;transform:translateY(7px);transition:none!important;}
.cur-card.card-show {opacity:1;transform:none;transition:opacity .32s var(--ease-out),transform .32s var(--ease-out)!important;}

.cc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.6rem;gap:1rem;}
.cc-title-wrap{flex:1;min-width:0;display:flex;flex-direction:column;gap:.4rem;}
.cc-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,2.8vw,2.4rem);font-weight:400;line-height:1.15;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-title.free-t{color:var(--dim);font-style:italic;}
.cc-range{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--gold-dim);letter-spacing:.04em;}
.manual-badge{font-family:'JetBrains Mono',monospace;font-size:.42rem;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);border:.5px solid rgba(74,127,184,.4);background:rgba(74,127,184,.08);padding:2px 6px;border-radius:3px;display:inline-block;margin-bottom:.4rem;}

/* ── Ring — FIX 1: NO animation, no pulse ── */
.ring-wrap{position:relative;flex-shrink:0;width:clamp(78px,9vw,112px);height:clamp(78px,9vw,112px);}
.ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%;}
.ring-track{fill:none;stroke:rgba(210,170,80,.07);}
/* FIX 1: removed ring-draw animation class entirely — stroke-dashoffset transitions are still smooth */
.ring-fill{fill:none;stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease-out),stroke .5s var(--ease-out);}
.ring-fill.urg{stroke:var(--red);}
.ring-fill.ring-manual{stroke:var(--blue);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-val{font-family:'JetBrains Mono',monospace;font-size:1.9rem;font-weight:200;color:var(--gold);line-height:1;}
.ring-val.urg{color:var(--red);}
.ring-val.secs{font-size:1.45rem;}
.ring-val.mv{color:var(--blue);font-size:1.3rem;}
.ring-unit{font-family:'JetBrains Mono',monospace;font-size:.44rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

/* ── Progress + stats ── */
.cc-bar-wrap{margin-bottom:1.1rem;}
.cc-bar-hdr{display:flex;justify-content:space-between;margin-bottom:.38rem;}
.cc-bar-pct,.cc-bar-dur{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--gold-dim);}
.cc-bar-dur{color:var(--muted);}
.cc-bar-track{height:2.5px;background:rgba(210,170,80,.08);border-radius:3px;overflow:hidden;}
.cc-bar-fill{height:100%;background:linear-gradient(90deg,rgba(210,170,80,.2),var(--gold));border-radius:3px;transition:width 1s var(--ease-out);}
.cc-bar-fill.blue{background:linear-gradient(90deg,rgba(74,127,184,.2),var(--blue));}
.cc-stats{display:flex;gap:1.8rem;}
.stat{display:flex;flex-direction:column;gap:2px;}
.stat-v{font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--text);}
.stat-k{font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.free-body{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.07em;line-height:1.6;}

/* ── Manual stop button ── */
.manual-stop-btn{font-family:'JetBrains Mono',monospace;font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .75rem;border-radius:6px;border:.5px solid rgba(184,74,68,.4);background:rgba(184,74,68,.06);color:rgba(184,74,68,.8);cursor:pointer;transition:all .2s var(--ease-out);width:100%;}
.manual-stop-btn:hover{background:rgba(184,74,68,.14);color:var(--red);}
.manual-stop-btn:active{transform:scale(.98);}

/* ── Conflict banner ── */
.conflict-banner{background:rgba(184,74,68,.07);border:.5px solid rgba(184,74,68,.3);border-radius:12px;padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;opacity:0;transform:translateY(-6px);transition:opacity .3s var(--ease-out),transform .3s var(--ease-spring);}
.conflict-banner.open{opacity:1;transform:none;}
.cb-icon{font-size:.9rem;color:rgba(184,74,68,.7);flex-shrink:0;}
.cb-body{flex:1;min-width:0;}
.cb-title{font-size:.72rem;font-weight:500;color:rgba(237,232,219,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cb-sub{font-family:'JetBrains Mono',monospace;font-size:.48rem;color:var(--muted);margin-top:2px;}
.cb-btns{display:flex;gap:.4rem;flex-shrink:0;}
.cb-btn{font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.07em;text-transform:uppercase;padding:.22rem .55rem;border-radius:4px;border:.5px solid;cursor:pointer;transition:all .2s var(--ease-out);white-space:nowrap;}
.cb-btn-keep{border-color:var(--border);background:transparent;color:var(--muted);}
.cb-btn-keep:hover{background:var(--gold-glow);color:var(--gold);}
.cb-btn-end{border-color:rgba(184,74,68,.4);background:rgba(184,74,68,.06);color:rgba(184,74,68,.8);}
.cb-btn-end:hover{background:rgba(184,74,68,.14);color:var(--red);}

/* ── Parallel strip ── */
.parallel-strip{margin-top:1rem;padding-top:.85rem;border-top:.5px solid rgba(210,170,80,.1);}
.parallel-label{font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.parallel-items{display:flex;flex-direction:column;gap:.35rem;}
.parallel-item{display:flex;align-items:center;gap:.7rem;padding:.38rem .55rem;border-radius:8px;background:rgba(210,170,80,.04);border:.5px solid rgba(210,170,80,.1);}
.parallel-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;}
.parallel-title{font-size:.72rem;color:rgba(237,232,219,.7);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.parallel-time{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--muted);flex-shrink:0;}
.parallel-remain{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--gold-dim);flex-shrink:0;}

/* ── Pause card ── */
.break-card{background:rgba(61,143,96,.04);border:.5px solid rgba(61,143,96,.2);border-radius:18px;padding:1.8rem 2.2rem;position:relative;overflow:hidden;}
.break-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--green),rgba(61,143,96,.08));border-radius:18px 0 0 18px;}
.break-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1.5rem;margin-bottom:.9rem;}
.break-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,2.4vw,2rem);font-weight:400;font-style:italic;color:rgba(61,143,96,.9);line-height:1.15;}
.break-range{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:rgba(61,143,96,.4);letter-spacing:.04em;margin-top:.35rem;}
.break-timer-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.break-timer-val{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:200;color:rgba(61,143,96,.7);line-height:1;letter-spacing:-1px;}
.break-timer-unit{font-family:'JetBrains Mono',monospace;font-size:.44rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.break-meta{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);line-height:1.7;}

/* ── End of Day ── */
.eod-icon{font-size:1.1rem;color:rgba(61,143,96,.6);margin-bottom:.65rem;display:block;}
.eod-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.7rem,2.8vw,2.4rem);font-weight:400;color:rgba(61,143,96,.9);line-height:1.15;margin-bottom:.5rem;}
.eod-stats{display:flex;gap:2rem;margin-bottom:.7rem;}
.eod-line{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);line-height:1.8;letter-spacing:.04em;}

/* ── Next bridge ── */
.next-bridge{padding:.15rem 0 0;display:flex;flex-direction:column;gap:.45rem;}
.nb-rule{display:flex;align-items:center;gap:.7rem;}
.nb-line{flex:1;height:.5px;background:var(--border);}
.nb-eta{font-family:'JetBrains Mono',monospace;font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.nb-info{display:flex;align-items:baseline;gap:1rem;padding:0 .1rem;}
.nb-time{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.nb-name{font-size:.85rem;font-weight:400;color:rgba(237,232,219,.62);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.nb-dur{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);flex-shrink:0;}

/* ── Schedule column ── */
.sched-col{display:flex;flex-direction:column;border-left:.5px solid var(--border);padding-left:1.6rem;min-height:0;gap:.55rem;}
.sched-hdr{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sched-lbl{font-family:'JetBrains Mono',monospace;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);}
.sched-count{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--muted);}
.sched-list{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:transparent transparent;display:flex;flex-direction:column;gap:.18rem;}
.sched-list:hover{scrollbar-color:var(--border) transparent;}
.sched-list::-webkit-scrollbar{width:2px;}
.sched-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sched-section-label{font-family:'JetBrains Mono',monospace;font-size:.44rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:.4rem .55rem .2rem;opacity:.7;}

/* ── Event rows ── */
.ev{display:flex;align-items:flex-start;border-radius:8px;padding:.42rem .5rem .42rem .55rem;transition:opacity .4s var(--ease-out),background .25s var(--ease-out);}
.ev.past{opacity:.55;}
.ev.past .ev-st{color:rgba(125,120,104,.75);}
.ev.cur{background:rgba(210,170,80,.05);border:.5px solid rgba(210,170,80,.18);opacity:1;}
.ev.cur .ev-st{color:var(--gold);}
.ev.cur .ev-name{color:var(--text);font-weight:500;}
.ev.nxt{opacity:.78;}
.ev.nxt .ev-name{color:rgba(237,232,219,.85);}
.ev.fut{opacity:.48;}
.ev.clickable{cursor:pointer;}
.ev.clickable:hover{background:rgba(210,170,80,.05);opacity:.9!important;}
.ev.clickable:active{background:rgba(210,170,80,.09);}
.ev.clickable:hover .ev-name{color:rgba(237,232,219,.92);}
.ev.clickable:hover .ev-accent{background:rgba(210,170,80,.5)!important;}
.ev.is-task .ev-accent{background:rgba(74,127,184,.35)!important;}
.ev.is-task.cur .ev-accent{background:var(--blue)!important;}
.ev.is-task.past{opacity:.4;}
.ev.task-row{background:rgba(74,127,184,.04);border:.5px solid rgba(74,127,184,.12);opacity:.85;}
.ev.task-row.done-task{opacity:.38;}
.ev.task-row .ev-name{color:rgba(180,200,230,.75);}
.ev.task-row.done-task .ev-name{text-decoration:line-through;color:var(--muted);}
.ev.list-anim{animation:li-in .38s var(--ease-out) both;}
@keyframes li-in{from{opacity:0;transform:translateX(-6px);}to{opacity:1;transform:none;}}
.ev-accent{width:2px;flex-shrink:0;border-radius:2px;margin-right:.55rem;align-self:stretch;transition:background .4s var(--ease-out);}
.ev.past .ev-accent{background:rgba(61,143,96,.3);}
.ev.cur  .ev-accent{background:var(--gold);}
.ev.nxt  .ev-accent{background:rgba(210,170,80,.3);}
.ev.fut  .ev-accent{background:rgba(210,170,80,.1);}
.ev.task-row .ev-accent{background:rgba(74,127,184,.4);}
.ev.task-row.done-task .ev-accent{background:rgba(61,143,96,.3);}
.ev-times{width:50px;flex-shrink:0;padding-top:1px;}
.ev-st{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);}
.ev-en{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:rgba(125,120,104,.35);margin-top:1px;}
.ev-body{flex:1;min-width:0;}
.ev-name{font-size:.74rem;font-weight:400;color:rgba(237,232,219,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
.ev-meta{display:flex;align-items:center;gap:.4rem;margin-top:1px;}
.ev-dur{font-family:'JetBrains Mono',monospace;font-size:.48rem;color:rgba(125,120,104,.35);}
.ev-tag{font-family:'JetBrains Mono',monospace;font-size:.44rem;letter-spacing:.06em;padding:0 4px;border-radius:2px;}
.ev-tag-now {color:var(--gold);border:.5px solid rgba(210,170,80,.3);background:rgba(210,170,80,.06);}
.ev-tag-next{color:rgba(210,170,80,.45);border:.5px solid rgba(210,170,80,.13);}
.ev-tag-done{color:rgba(61,143,96,.6);}
.ev-tag-task{color:rgba(74,127,184,.8);border:.5px solid rgba(74,127,184,.3);background:rgba(74,127,184,.07);}
.ev-tag-task-done{color:rgba(61,143,96,.6);}
.ev-tag-start{color:rgba(74,127,184,.7);border:.5px solid rgba(74,127,184,.3);background:rgba(74,127,184,.06);}
.ev-cal{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:5px;margin-right:4px;}

/* ── Footer ── */
.footer{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;padding-top:.65rem;border-top:.5px solid rgba(210,170,80,.06);}
.status-row{font-family:'JetBrains Mono',monospace;font-size:.52rem;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:.4rem;}
.sdot{width:4px;height:4px;border-radius:50%;background:var(--green);transition:background .4s var(--ease-out);animation:sdot-p 2.5s ease-in-out infinite;}
.sdot.err{background:var(--red);animation:none;}
.sdot.warn{background:var(--gold);animation:none;}
@keyframes sdot-p{0%,100%{opacity:1;}50%{opacity:.3;}}
.fbtns{display:flex;gap:.35rem;align-items:center;}
.btn{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;padding:.22rem .6rem;border-radius:4px;border:.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .22s var(--ease-out);line-height:1;}
.btn:hover{background:var(--gold-glow);color:var(--gold);border-color:rgba(210,170,80,.3);}
.btn:active{transform:scale(.96);}
.btn.login-needed{border-color:rgba(210,170,80,.45);color:var(--gold);}

/* ── Calendar overlay ── */
.cal-overlay{position:fixed;inset:0;background:rgba(7,7,15,.88);z-index:50;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .28s var(--ease-out);}
.cal-overlay.open{opacity:1;pointer-events:all;}
.cal-panel{background:var(--surface);border:.5px solid rgba(210,170,80,.16);border-radius:16px;padding:1.4rem;width:min(540px,90vw);max-height:82vh;display:flex;flex-direction:column;gap:.85rem;transform:translateY(12px);transition:transform .32s var(--ease-spring);}
.cal-overlay.open .cal-panel{transform:none;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;}
.cal-title{font-family:'JetBrains Mono',monospace;font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);}
.tl-scroll{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.tl-inner{position:relative;padding-left:42px;}
.tl-hlabel{font-family:'JetBrains Mono',monospace;font-size:.46rem;color:rgba(125,120,104,.35);width:32px;text-align:right;}
.tl-hrule{flex:1;height:.5px;background:rgba(237,232,219,.025);}
.tl-hour{position:absolute;left:0;right:0;display:flex;align-items:center;gap:.4rem;pointer-events:none;}
.tl-block{position:absolute;left:46px;right:2px;border-radius:5px;padding:.22rem .45rem;overflow:hidden;}
.tl-btitle{font-size:.66rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.tl-btime{font-family:'JetBrains Mono',monospace;font-size:.48rem;opacity:.55;margin-top:1px;}
.tl-now-line{position:absolute;left:0;right:0;display:flex;align-items:center;pointer-events:none;z-index:5;}
.tl-now-dot{width:6px;height:6px;border-radius:50%;background:var(--red);margin-left:32px;flex-shrink:0;box-shadow:0 0 5px rgba(184,74,68,.5);}
.tl-now-rule{flex:1;height:1px;background:rgba(184,74,68,.3);}

/* ── Activation modal ── */
.activation-modal{position:fixed;inset:0;background:rgba(7,7,15,.82);z-index:60;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .25s var(--ease-out);}
.activation-modal.open{opacity:1;pointer-events:all;}
.act-panel{background:var(--surface);border:.5px solid rgba(74,127,184,.28);border-radius:16px;padding:1.6rem 1.8rem;width:min(400px,88vw);transform:translateY(10px) scale(.97);transition:transform .32s var(--ease-spring);}
.activation-modal.open .act-panel{transform:none;}
.act-label{font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(74,127,184,.6);margin-bottom:.55rem;}
.act-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:400;color:var(--text);line-height:1.2;margin-bottom:.3rem;}
.act-range{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--gold-dim);margin-bottom:.65rem;}
.act-hint{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--muted);line-height:1.65;margin-bottom:1.1rem;padding:.55rem .65rem;background:rgba(74,127,184,.04);border:.5px solid rgba(74,127,184,.1);border-radius:7px;}
.act-btns{display:flex;gap:.5rem;justify-content:flex-end;}
.act-btn{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;padding:.3rem .85rem;border-radius:5px;border:.5px solid;cursor:pointer;transition:all .2s var(--ease-out);}
.act-btn-cancel{border-color:var(--border);background:transparent;color:var(--muted);}
.act-btn-cancel:hover{background:rgba(237,232,219,.05);color:var(--text);}
.act-btn-start{border-color:rgba(74,127,184,.5);background:rgba(74,127,184,.1);color:var(--blue);}
.act-btn-start:hover{background:rgba(74,127,184,.2);color:#7ab0e8;}

/* ── Toast ── */
.toast{position:fixed;top:1.4rem;left:50%;transform:translateX(-50%) translateY(-10px) scale(.96);background:var(--surface);border:.5px solid rgba(210,170,80,.28);border-radius:9px;padding:.55rem 1.25rem;display:flex;align-items:center;gap:.65rem;z-index:200;opacity:0;pointer-events:none;transition:opacity .32s var(--ease-out),transform .32s var(--ease-spring);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
.toast-icon{font-size:.85rem;color:var(--gold);opacity:.75;}
.toast-main{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--gold);letter-spacing:.07em;}
.toast-sub{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--muted);margin-top:1px;}

/* ══════════════════════════════════════════
   FIX 3 — Planner Overlay
══════════════════════════════════════════ */
.planner-overlay{position:fixed;inset:0;background:rgba(7,7,15,.92);z-index:70;display:flex;align-items:stretch;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .28s var(--ease-out);backdrop-filter:blur(8px);}
.planner-overlay.open{opacity:1;pointer-events:all;}
.planner-panel{background:var(--surface);border-left:.5px solid rgba(210,170,80,.14);width:min(560px,100vw);display:flex;flex-direction:column;transform:translateX(24px);transition:transform .35s var(--ease-spring);}
.planner-overlay.open .planner-panel{transform:none;}
.planner-topbar{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.planner-title{font-family:'JetBrains Mono',monospace;font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);}
.planner-tabs{display:flex;gap:.25rem;padding:.7rem 1.5rem;border-bottom:.5px solid var(--border);flex-shrink:0;}
.ptab{font-family:'JetBrains Mono',monospace;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .7rem;border-radius:4px;border:.5px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s var(--ease-out);}
.ptab.active{border-color:rgba(210,170,80,.3);background:var(--gold-glow);color:var(--gold);}
.ptab:hover:not(.active){color:var(--text);}
.planner-body{flex:1;overflow-y:auto;padding:1.2rem 1.5rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.planner-body::-webkit-scrollbar{width:2px;}
.planner-body::-webkit-scrollbar-thumb{background:var(--border);}

/* Planner: form elements */
.pf-section{margin-bottom:1.4rem;}
.pf-label{font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:block;}
.pf-input{width:100%;background:rgba(237,232,219,.04);border:.5px solid var(--border);border-radius:6px;padding:.55rem .75rem;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text);outline:none;transition:border-color .2s var(--ease-out);}
.pf-input:focus{border-color:rgba(210,170,80,.35);}
.pf-input::placeholder{color:var(--muted);}
.pf-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.pf-select{width:100%;background:rgba(237,232,219,.04);border:.5px solid var(--border);border-radius:6px;padding:.55rem .75rem;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text);outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;}
.pf-select:focus{border-color:rgba(210,170,80,.35);}
.pf-select option{background:var(--surface);color:var(--text);}
.pf-hint{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--muted);margin-top:.35rem;line-height:1.6;}
.pf-btn{font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:.45rem 1.1rem;border-radius:6px;border:.5px solid rgba(210,170,80,.4);background:var(--gold-glow);color:var(--gold);cursor:pointer;transition:all .2s var(--ease-out);width:100%;}
.pf-btn:hover{background:rgba(210,170,80,.14);border-color:rgba(210,170,80,.65);}
.pf-btn:active{transform:scale(.98);}
.pf-btn.blue{border-color:rgba(74,127,184,.4);background:rgba(74,127,184,.06);color:var(--blue);}
.pf-btn.blue:hover{background:rgba(74,127,184,.15);}
.pf-btn.danger{border-color:rgba(184,74,68,.35);background:rgba(184,74,68,.06);color:rgba(184,74,68,.85);}
.pf-btn.danger:hover{background:rgba(184,74,68,.14);}
.pf-divider{height:.5px;background:var(--border);margin:1rem 0;}

/* Planner: slot picker */
.slot-list{display:flex;flex-direction:column;gap:.35rem;margin-top:.7rem;}
.slot-item{display:flex;align-items:center;gap:.8rem;padding:.55rem .75rem;border-radius:8px;border:.5px solid var(--border);background:rgba(237,232,219,.02);cursor:pointer;transition:all .2s var(--ease-out);}
.slot-item:hover{border-color:rgba(210,170,80,.3);background:var(--gold-glow);}
.slot-item.selected{border-color:rgba(74,127,184,.45);background:rgba(74,127,184,.07);}
.slot-time{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--text);flex-shrink:0;width:90px;}
.slot-dur{font-family:'JetBrains Mono',monospace;font-size:.52rem;color:var(--muted);flex:1;}
.slot-radio{width:12px;height:12px;border-radius:50%;border:.5px solid var(--border);flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.slot-item.selected .slot-radio{border-color:var(--blue);background:var(--blue);}
.slot-item.selected .slot-radio::after{content:'';width:5px;height:5px;border-radius:50%;background:white;}

/* Planner: event list for reschedule */
.planner-ev-list{display:flex;flex-direction:column;gap:.3rem;margin-bottom:1rem;}
.planner-ev-item{display:flex;align-items:center;gap:.7rem;padding:.48rem .6rem;border-radius:7px;border:.5px solid var(--border);background:rgba(237,232,219,.02);cursor:pointer;transition:all .2s var(--ease-out);}
.planner-ev-item:hover{border-color:rgba(210,170,80,.25);background:var(--gold-glow);}
.planner-ev-item.selected{border-color:rgba(210,170,80,.45);background:rgba(210,170,80,.06);}
.planner-ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.planner-ev-name{font-size:.74rem;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.planner-ev-time{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--muted);flex-shrink:0;}

/* Planner: preferences */
.pref-row{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:.5px solid rgba(237,232,219,.04);}
.pref-label{font-size:.72rem;color:var(--text);}
.pref-sub{font-family:'JetBrains Mono',monospace;font-size:.46rem;color:var(--muted);margin-top:2px;}
.pref-val{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--gold);}

/* Planner: result card */
.plan-result{background:rgba(74,127,184,.05);border:.5px solid rgba(74,127,184,.2);border-radius:10px;padding:.85rem 1rem;margin-top:.85rem;}
.plan-result-title{font-family:'JetBrains Mono',monospace;font-size:.46rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(74,127,184,.6);margin-bottom:.55rem;}
.plan-result-row{display:flex;align-items:center;gap:.7rem;padding:.3rem 0;border-bottom:.5px solid rgba(74,127,184,.08);}
.plan-result-row:last-child{border-bottom:none;}
.plan-result-time{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text);width:110px;flex-shrink:0;}
.plan-result-name{font-size:.72rem;color:rgba(237,232,219,.8);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.plan-result-dur{font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--muted);}
.plan-result-badge{font-family:'JetBrains Mono',monospace;font-size:.42rem;letter-spacing:.08em;padding:1px 5px;border-radius:3px;}
.prb-pause{color:rgba(61,143,96,.7);border:.5px solid rgba(61,143,96,.25);background:rgba(61,143,96,.06);}
.prb-event{color:rgba(74,127,184,.8);border:.5px solid rgba(74,127,184,.25);background:rgba(74,127,184,.06);}
.prb-fixed{color:rgba(210,170,80,.7);border:.5px solid rgba(210,170,80,.2);background:rgba(210,170,80,.04);}

/* Planner: loading spinner */
.plan-loading{display:flex;align-items:center;gap:.6rem;padding:.8rem 0;font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);}
.plan-spinner{width:12px;height:12px;border:1.5px solid rgba(210,170,80,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Responsive ── */
@media(max-width:960px) and (min-width:821px){
  .shell{padding:1.2rem 1.4rem .9rem;gap:0 1.2rem;}
  .sched-col{padding-left:1rem;}
  .cur-card{padding:1.4rem;}
  .ring-wrap{width:76px;height:76px;}
  .ring-val{font-size:1.3rem;}
  .ring-val.secs{font-size:1rem;}
  .ring-val.mv{font-size:1.1rem;}
  .cc-title{font-size:clamp(1.2rem,2.1vw,1.8rem);}
  .cc-stats{gap:1.1rem;}
  .stat-v{font-size:.68rem;}
  .hdr-date{font-size:.5rem;letter-spacing:.1em;}
}
@media(max-width:820px){
  .shell{grid-template-columns:1fr;grid-template-rows:auto auto 1fr auto;height:auto;min-height:100svh;overflow-y:auto;}
  body,html{overflow:auto;}
  .sched-col{border-left:none;border-top:.5px solid var(--border);padding-left:0;padding-top:1.1rem;}
  .sched-list{max-height:340px;}
  .footer,.hdr{grid-column:1;}
  .planner-panel{width:100vw;}
}
</style>

<body>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const SCOPES        = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/tasks.readonly';
const SCOPE_VERSION = 5;
const CAL_API       = 'https://www.googleapis.com/calendar/v3';
const TASKS_API     = 'https://tasks.googleapis.com/tasks/v1';
const RING_R=50, RING_C=2*Math.PI*RING_R;
const SK_TOKEN      = 'fd_tok5';
const CLIENT_ID     = '800573913528-tgntatesfbqdmmq1br2ubrfbp5ephh0s.apps.googleusercontent.com';
const TL_S=7,TL_E=23,PX_H=58;
const AUTO_MS=5*60*1000, REFRESH_BEFORE=10*60*1000;
const LS_MIN=900;
const CAL_COLORS={};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let events=[],tasks=[],token=null;
let refreshTmr=null,clockTmr=null,tokenRefreshTmr=null;
let achFired={},eodShown=false,isRefreshing=false;
let prevCardKey=null,cardAnimating=false,schedFirstRender=true;
let lsStart=Date.now();
let manualSession=null;
let conflictBannerActive=false;
// Planner state
let plannerTab='reschedule';
let plannerSelectedEvId=null;
let plannerSelectedSlot=null;
let plannerNewItems=[];   // [{title,durMin}]

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function ss(o){for(const[k,v] of Object.entries(o))localStorage.setItem(k,JSON.stringify(v));}
function hm(d){return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
function dur(ms){const m=Math.floor(ms/60000);if(m<60)return`${m}m`;const h=Math.floor(m/60),r=m%60;return r?`${h}h\u202f${r}m`:`${h}h`;}
function isMobile(){return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);}
function todayStr(){return new Date().toISOString().split('T')[0];}
function padT(n){return String(n).padStart(2,'0');}
function fmtWorked(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),sc=s%60;return`${padT(m)}:${padT(sc)}`;}
function dateStr(d){return d.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'});}

// ═══════════════════════════════════════════════════
// PREFERENCES (Planner)
// ═══════════════════════════════════════════════════
const PREF_KEY='fd_prefs';
const DEFAULT_PREFS={workStart:'08:00',workEnd:'20:00',minPause:15,maxBlock:120};
function getPrefs(){return Object.assign({},DEFAULT_PREFS,sg(PREF_KEY)||{});}
function savePrefs(p){ss({[PREF_KEY]:p});}

// ═══════════════════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════════════════
async function revealApp(){
  const elapsed=Date.now()-lsStart;
  await new Promise(r=>setTimeout(r,Math.max(0,LS_MIN-elapsed)));
  const ms=$('main-screen');
  ms.style.display=''; ms.offsetHeight;
  $('loading-screen').classList.add('ls-exit');
  await new Promise(r=>setTimeout(r,80));
  ms.classList.add('visible');
  await new Promise(r=>setTimeout(r,420));
  $('loading-screen').style.display='none';
}

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
function buildAuthUrl(){
  const u=new URL('https://accounts.google.com/o/oauth2/v2/auth');
  u.searchParams.set('client_id',CLIENT_ID);
  u.searchParams.set('response_type','token');
  u.searchParams.set('redirect_uri',window.location.origin+window.location.pathname);
  u.searchParams.set('scope',SCOPES);
  u.searchParams.set('prompt','select_account consent');
  return u.toString();
}
function doAuth(){
  return new Promise((res,rej)=>{
    if(isMobile()){ss({pending_auth:'1'});window.location.href=buildAuthUrl();return;}
    const W=520,H=620,L=Math.round(screen.width/2-W/2),T=Math.round(screen.height/2-H/2);
    const popup=window.open(buildAuthUrl(),'_auth',`width=${W},height=${H},left=${L},top=${T},toolbar=no`);
    if(!popup||popup.closed){rej(new Error('popup_blocked'));return;}
    const t=setInterval(()=>{
      try{const u=popup.location.href;if(u.startsWith(window.location.origin)){clearInterval(t);popup.close();const p=new URLSearchParams(new URL(u).hash.slice(1));const tok=p.get('access_token'),exp=parseInt(p.get('expires_in')||'3600');if(tok)res({token:tok,expiresIn:exp});else rej(new Error('no_token'));}}catch(_){}
      if(popup.closed){clearInterval(t);rej(new Error('closed'));}
    },500);
  });
}
function tokenValid(){const s=sg(SK_TOKEN);return s&&s.token&&s.exp>Date.now()+60000&&s.sv===SCOPE_VERSION;}
function loadToken(){const s=sg(SK_TOKEN);if(s&&s.token){token=s.token;return true;}return false;}
function saveToken(tok,exp){token=tok;ss({[SK_TOKEN]:{token:tok,exp:Date.now()+exp*1000,sv:SCOPE_VERSION}});}
function scheduleTokenRefresh(){clearTimeout(tokenRefreshTmr);const s=sg(SK_TOKEN);if(!s||!s.exp)return;const ms=s.exp-Date.now()-REFRESH_BEFORE;tokenRefreshTmr=setTimeout(()=>triggerReauth(),ms>0?ms:0);}

// Silent refresh via hidden iframe — no popup, no white flash
// Works as long as user is still logged into Google in the browser
function silentRefresh(){
  return new Promise((res,rej)=>{
    const iframe=document.createElement('iframe');
    iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none;visibility:hidden;';
    const u=new URL('https://accounts.google.com/o/oauth2/v2/auth');
    u.searchParams.set('client_id',CLIENT_ID);
    u.searchParams.set('response_type','token');
    u.searchParams.set('redirect_uri',window.location.origin+window.location.pathname);
    u.searchParams.set('scope',SCOPES);
    u.searchParams.set('prompt','none'); // KEY: no UI shown
    iframe.src=u.toString();
    document.body.appendChild(iframe);
    let done=false;
    const cleanup=()=>{if(!done){done=true;try{document.body.removeChild(iframe);}catch{}}};
    const timeout=setTimeout(()=>{cleanup();rej(new Error('silent_timeout'));},12000);
    // Poll for redirect back to our origin
    const poll=setInterval(()=>{
      try{
        const loc=iframe.contentWindow.location.href;
        if(loc.startsWith(window.location.origin)){
          clearInterval(poll);clearTimeout(timeout);cleanup();
          const p=new URLSearchParams(new URL(loc).hash.slice(1));
          const tok=p.get('access_token'),exp=parseInt(p.get('expires_in')||'3600');
          if(tok)res({token:tok,expiresIn:exp});
          else rej(new Error('no_token_silent'));
        }
      }catch(_){/* cross-origin while Google is loading — normal */}
    },250);
  });
}

async function triggerReauth(){
  if(isRefreshing)return;isRefreshing=true;
  // 1. Try completely silent refresh first — user sees nothing
  try{
    const{token:tok,expiresIn:exp}=await silentRefresh();
    saveToken(tok,exp);scheduleTokenRefresh();
    token=tok; // update in-memory token immediately
    isRefreshing=false;
    setStatus(true);
    // Reload data silently, keep manual session intact
    await loadData();
    return;
  }catch(e){
    console.info('Silent refresh failed, falling back to popup:',e.message);
  }
  // 2. Silent failed — need user interaction
  setStatus('warn','Neu-Anmeldung …');
  try{
    if(isMobile()){saveManualSession();ss({pending_auth:'1'});window.location.href=buildAuthUrl();return;}
    const{token:tok,expiresIn:exp}=await doAuth();
    saveToken(tok,exp);setStatus(true);scheduleTokenRefresh();await loadData();
  }catch{
    setStatus('err','Sitzung abgelaufen');
    const b=$('refresh-btn');b.textContent='Anmelden →';b.classList.add('login-needed');
  }finally{isRefreshing=false;}
}

async function apiFetch(url,method='GET',body=null){
  const h={'Authorization':`Bearer ${token}`};
  const opts={method,headers:h};
  if(body){h['Content-Type']='application/json';opts.body=JSON.stringify(body);}
  const r=await fetch(url,opts);
  if(r.status===401)throw new Error('auth_expired');
  if(!r.ok)throw new Error('api_err_'+r.status);
  return r.json();
}
async function fetchCalendarList(){
  const data=await apiFetch(`${CAL_API}/users/me/calendarList`);
  return (data.items||[]).map(c=>({id:c.id,name:c.summary||c.id,color:c.backgroundColor||'#d2aa50'}));
}
async function fetchEvents(dateISO){
  // dateISO optional — defaults to today
  const base=dateISO?new Date(dateISO):new Date();
  const s=new Date(base);s.setHours(0,0,0,0);
  const e=new Date(base);e.setHours(23,59,59,999);
  const cals=await fetchCalendarList();
  cals.forEach(c=>{CAL_COLORS[c.id]=c.color;});
  const results=await Promise.allSettled(cals.map(async cal=>{
    const url=new URL(`${CAL_API}/calendars/${encodeURIComponent(cal.id)}/events`);
    url.searchParams.set('timeMin',s.toISOString());
    url.searchParams.set('timeMax',e.toISOString());
    url.searchParams.set('singleEvents','true');
    url.searchParams.set('orderBy','startTime');
    url.searchParams.set('maxResults','40');
    const data=await apiFetch(url.toString());
    return (data.items||[]).filter(e=>e.start?.dateTime).map(e=>({
      id:e.id,title:e.summary||'(Kein Titel)',
      start:new Date(e.start.dateTime),end:new Date(e.end.dateTime),
      calId:cal.id,calColor:cal.color,
      isTask:e.eventType==='task'||cal.id.includes('@tasks'),
      colorId:e.colorId
    }));
  }));
  const seen=new Set();
  return results.filter(r=>r.status==='fulfilled').flatMap(r=>r.value)
    .filter(e=>{if(seen.has(e.id))return false;seen.add(e.id);return true;})
    .sort((a,b)=>a.start-b.start);
}
async function fetchTasks(){
  try{
    const lists=(await apiFetch(`${TASKS_API}/users/@me/lists`)).items||[];
    const today=todayStr();
    const results=await Promise.allSettled(lists.map(async list=>{
      const url=new URL(`${TASKS_API}/lists/${list.id}/tasks`);
      url.searchParams.set('showCompleted','true');url.searchParams.set('showHidden','false');url.searchParams.set('maxResults','50');
      const data=await apiFetch(url.toString());
      return (data.items||[]).filter(t=>t.due&&t.due.startsWith(today)).map(t=>({
        id:'task_'+t.id,title:t.title||'(Aufgabe)',isTask:true,done:t.status==='completed',listTitle:list.title
      }));
    }));
    return results.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
  }catch(e){console.warn('Tasks:',e.message);return[];}
}
async function loadData(){
  try{
    [events,tasks]=await Promise.all([fetchEvents(),fetchTasks()]);
    if(manualSession){const u=events.find(e=>e.id===manualSession.event.id);if(u)manualSession.event=u;}
    schedFirstRender=true;setStatus(true);renderAll();

  }catch(e){handleApiErr(e);}
}
async function handleApiErr(e){

}

const SK_SESSION='fd_manual_session';

function saveManualSession(){
  if(!manualSession)return;
  ss(SK_SESSION,{
    sessionStart:manualSession.sessionStart.getTime(),
    event:{
      id:manualSession.event.id,title:manualSession.event.title,
      start:manualSession.event.start.getTime(),end:manualSession.event.end.getTime(),
      calId:manualSession.event.calId,calColor:manualSession.event.calColor,
      isTask:manualSession.event.isTask||false,colorId:manualSession.event.colorId||null
    }
  });
}

function clearManualSession(){
  localStorage.removeItem(SK_SESSION);
}

function restoreManualSession(){
  const s=sg(SK_SESSION);
  if(!s||!s.sessionStart)return;
  const ev={
    ...s.event,
    start:new Date(s.event.start),
    end:new Date(s.event.end)
  };
  // Only restore if original event end hasn't passed yet
  if(new Date()>=ev.end){clearManualSession();return;}
  manualSession={event:ev,sessionStart:new Date(s.sessionStart)};
  toast('◆','Session wiederhergestellt',ev.title);
}

async function endManualSession(){

/**
 * FIX 2 core:
 * 1. Fetch full event data (preserves all fields: color, description, location, …)
 * 2. POST a new event from sessionStart → sessionStart+workedMs with "⏩ Vorgezogen" note
 * 3. PATCH original event to shorten it by workedMs
 */
async function patchAndLogEvent(ev, sessionStart, workedMs){
  const url=`${CAL_API}/calendars/${encodeURIComponent(ev.calId)}/events/${encodeURIComponent(ev.id)}`;
  const full=await apiFetch(url);

  const logStart=sessionStart;
  const logEnd  =new Date(sessionStart.getTime()+workedMs);

  // Build log event — copy all metadata from original
  const logBody={
    summary: full.summary,
    description: [
      '⏩ Vorgezogen · Original: '+hm(ev.start)+' – '+hm(ev.end),
      full.description||''
    ].filter(Boolean).join('\n\n'),
    location:    full.location    || undefined,
    colorId:     full.colorId     || undefined,
    reminders:   {useDefault:false,overrides:[]},  // no reminders for log
    start:{dateTime:logStart.toISOString(), timeZone:full.start.timeZone||'Europe/Berlin'},
    end:  {dateTime:logEnd.toISOString(),   timeZone:full.end.timeZone  ||'Europe/Berlin'},
  };
  // Remove undefined keys
  Object.keys(logBody).forEach(k=>logBody[k]===undefined&&delete logBody[k]);

  // POST log entry
  await apiFetch(
    `${CAL_API}/calendars/${encodeURIComponent(ev.calId)}/events`,
    'POST',
    logBody
  );

  // PATCH original — shorten by workedMs
  const origEnd =new Date(full.end.dateTime);
  const newEnd  =new Date(origEnd.getTime()-workedMs);
  const minEnd  =new Date(new Date(full.start.dateTime).getTime()+5*60*1000);
  const finalEnd=newEnd<minEnd?minEnd:newEnd;
  await apiFetch(url,'PATCH',{
    end:{dateTime:finalEnd.toISOString(),timeZone:full.end.timeZone||'Europe/Berlin'}
  });
}

async function patchEventShorter(ev,workedMs){
  // Legacy — only used for conflict-end without session log
  const url=`${CAL_API}/calendars/${encodeURIComponent(ev.calId)}/events/${encodeURIComponent(ev.id)}`;
  const full=await apiFetch(url);
  const origEnd=new Date(full.end.dateTime);
  const newEnd=new Date(origEnd.getTime()-workedMs);
  const minEnd=new Date(new Date(full.start.dateTime).getTime()+5*60*1000);
  const finalEnd=newEnd<minEnd?minEnd:newEnd;
  await apiFetch(url,'PATCH',{end:{dateTime:finalEnd.toISOString(),timeZone:full.end.timeZone||'Europe/Berlin'}});
}

function getCardKey(now){
  if(manualSession)return'manual:'+manualSession.event.id;
  const allDone=events.length>0&&events.every(e=>e.end<=now);if(allDone)return'eod';
  const curAll=events.filter(e=>e.start<=now&&e.end>now);
  if(curAll.length>0)return'active:'+curAll.map(e=>e.id).join(',');
  const nxt=events.find(e=>e.start>now);if(nxt)return'pause:'+nxt.id;
  return'none';
}

function renderAll(){const now=new Date();renderCurrentCardAnimated(now);renderNextBridge(now);renderSchedule(now);renderPills(now);}

function renderCurrentCardAnimated(now){
  const key=getCardKey(now);
  if(key!==prevCardKey&&!cardAnimating){
    cardAnimating=true;const card=$('cur-card');
    card.classList.remove('card-show');card.classList.add('card-exit');
    setTimeout(()=>{
      prevCardKey=key;renderCurrentCard(now);
      card.classList.remove('card-exit');card.classList.add('card-enter');
      card.offsetHeight;
      card.classList.remove('card-enter');card.classList.add('card-show');
      setTimeout(()=>{card.classList.remove('card-show');cardAnimating=false;},360);
    },190);
  }else if(!cardAnimating){renderCurrentCard(now);}
}

    const totalMs=ev.end-ev.start,remainMs=Math.max(0,totalMs-workedMs),pct=Math.min(1,workedMs/totalMs);

      <div class="stat"><div class="stat-v">${dur(remainMs)}</div><div class="stat-k">restzeit</div></div>

  }

  const curAll=events.filter(e=>e.start<=now&&e.end>now);

  // ── Pause ──

    const prev=[...events].reverse().find(e=>e.end<=now);

    </div>
    <div class="ring-wrap">
      <svg viewBox="0 0 112 112" style="width:100%;height:100%;">
        <circle class="ring-track" cx="56" cy="56" r="${RING_R}" stroke-width="4"/>
        <circle class="${urgent?'ring-fill urg':'ring-fill'}" cx="56" cy="56" r="${RING_R}"
          stroke-width="4" stroke-dasharray="${RING_C.toFixed(2)}"
          stroke-dashoffset="${(RING_C*(1-Math.max(0,remainMs/totalMs))).toFixed(2)}"/>
      </svg>

// NEXT BRIDGE
// ═══════════════════════════════════════════════════
function renderNextBridge(now){
  const wrap=$('next-bridge');
  const cur=events.find(e=>e.start<=now&&e.end>now),nxt=events.find(e=>e.start>now);
  if(!cur||!nxt){wrap.innerHTML='';return;}
  const ms=nxt.start-now,m=Math.round(ms/60000);
  const eta=m<60?`in ${m} min`:(()=>{const h=Math.floor(m/60),r=m%60;return`in ${h}h${r?'\u202f'+r+'m':''}`;})();
  const gap=Math.round((nxt.start-cur.end)/60000),gapStr=gap>0?` · ${gap}m Pause danach`:'';
  wrap.innerHTML=`<div class="next-bridge">
    <div class="nb-rule"><div class="nb-line"></div><div class="nb-eta">${eta}${gapStr}</div><div class="nb-line"></div></div>
    <div class="nb-info"><div class="nb-time">${hm(nxt.start)}</div><div class="nb-name">${esc(nxt.title)}</div><div class="nb-dur">${dur(nxt.end-nxt.start)}</div></div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// SCHEDULE
// ═══════════════════════════════════════════════════
function renderSchedule(now){
  const list=$('sched-list');
  const dc=events.filter(e=>e.end<=now).length,td=tasks.filter(t=>t.done).length;
  $('sched-count').textContent=`${dc}/${events.length}${tasks.length?` · ${td}/${tasks.length} ☐`:''}`;
  const cur=events.find(e=>e.start<=now&&e.end>now),nxt=events.find(e=>e.start>now);
  let html='';
  if(tasks.length>0){
    html+=`<div class="sched-section-label">Aufgaben · heute fällig</div>`;
    html+=tasks.map(t=>{
      const cls='ev task-row'+(t.done?' done-task':'');
      const tag=t.done?`<span class="ev-tag ev-tag-task-done">✓</span>`:`<span class="ev-tag ev-tag-task">☐ Aufgabe</span>`;
      return`<div class="${cls}"><div class="ev-accent"></div>
        <div class="ev-times"><div class="ev-st" style="color:rgba(74,127,184,.5)">☐</div></div>
        <div class="ev-body"><div class="ev-name">${esc(t.title)}</div><div class="ev-meta">${tag}</div></div>
      </div>`;
    }).join('');
    if(events.length>0)html+=`<div class="sched-section-label" style="margin-top:.35rem">Termine</div>`;
  }
  if(!events.length&&!tasks.length){
    list.innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-style:italic;color:var(--dim);font-size:.9rem;padding:1.5rem .4rem;">Keine Termine.</div>';
    return;
  }
  html+=events.map(e=>{
    const isPast=e.end<=now,isCur=cur&&e.id===cur.id,isNxt=nxt&&e.id===nxt.id;
    const isClickable=!isPast&&!isCur&&!e.isTask&&!(manualSession&&manualSession.event.id===e.id);
    const cls='ev '+(isPast?'past':isCur?'cur':isNxt?'nxt':'fut')
              +(isClickable?' clickable':'')+(e.isTask?' is-task':'');
    const clickAttr=isClickable?`onclick="activateEventModal('${e.id.replace(/'/g,"\\'")}')"`:'';
    let tag='';
    if(isCur)                             tag=`<span class="ev-tag ev-tag-now">◆</span>`;
    else if(manualSession?.event.id===e.id)tag=`<span class="ev-tag ev-tag-start" style="color:var(--blue);border-color:rgba(74,127,184,.3);">▶ Aktiv</span>`;
    else if(isNxt&&!e.isTask)             tag=`<span class="ev-tag ev-tag-next">nächster</span>`;
    else if(isPast&&!e.isTask)            tag=`<span class="ev-tag ev-tag-done">✓</span>`;
    else if(isClickable)                  tag=`<span class="ev-tag ev-tag-start">▷ starten</span>`;
    const typeTag=e.isTask?`<span class="ev-tag ev-tag-task">☐</span>`:'';
    const dot=e.calColor&&!e.isTask?`<div class="ev-cal" style="background:${e.calColor}"></div>`:'';
    return`<div class="${cls}" ${clickAttr}><div class="ev-accent"></div>
      <div class="ev-times"><div class="ev-st">${hm(e.start)}</div><div class="ev-en">${hm(e.end)}</div></div>
      <div class="ev-body"><div class="ev-name">${esc(e.title)}</div>
        <div class="ev-meta">${dot}<span class="ev-dur">${dur(e.end-e.start)}</span>${tag||typeTag}</div>
      </div>
    </div>`;
  }).join('');
  list.innerHTML=html;
  if(schedFirstRender){
    schedFirstRender=false;
    list.querySelectorAll('.ev').forEach((el,i)=>{el.classList.add('list-anim');el.style.animationDelay=`${i*45}ms`;});
  }
}

function renderPills(now){
  const max=Math.min(events.length,14);

// ═══════════════════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════════════════
function checkAchievements(ev,pct,remainMin,remainSec){
  const k=ev.id;if(!achFired[k])achFired[k]=new Set();const f=achFired[k];
  if(!f.has('start'))                               {f.add('start');toast('◆','Block gestartet',ev.title);}
  else if(pct>=.25&&!f.has('q1'))                   {f.add('q1');   toast('◆◆','25 %',ev.title);}
  else if(pct>=.5 &&!f.has('half'))                 {f.add('half'); toast('◆◆','Halbzeit',ev.title);}
  else if(pct>=.75&&!f.has('q3'))                   {f.add('q3');   toast('◆◆◆','75 %',ev.title);}
  else if(remainMin<=10&&remainMin>5&&!f.has('10m')){f.add('10m');  toast('◇','10 Minuten',ev.title);}
  else if(remainMin<=5 &&remainMin>1&&!f.has('5m')) {f.add('5m');   toast('◇','5 Minuten',ev.title);}
  else if(remainMin<=1 &&remainSec>0&&!f.has('1m')) {f.add('1m');   toast('◇','Letzte Minute',ev.title);}
  else if(pct>=.99&&!f.has('done')){
    f.add('done');const dc=events.filter(e=>e.end<=new Date()).length+1;
    toast('✦',dc===events.length?'Alle Blöcke abgeschlossen':'Abgeschlossen',ev.title);
  }
  const now2=new Date(),dn=events.filter(e=>e.end<=now2).length,hk='half_day_'+Math.floor(events.length/2);
  if(dn===Math.floor(events.length/2)&&events.length>2&&!achFired[hk]){
    achFired[hk]=new Set(['done']);toast('◆◆◆',`${dn} von ${events.length} Blöcken erledigt`,'');
  }
}
let toastTimer=null;
function toast(icon,main,sub){
  $('toast-icon').textContent=icon;$('toast-main').textContent=main;$('toast-sub').textContent=sub||'';
  $('toast').classList.add('show');clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>$('toast').classList.remove('show'),3500);
}

// ═══════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════
function tick(){
  const now=new Date();
  $('clock').firstChild.textContent=now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  $('secs').textContent=':'+String(now.getSeconds()).padStart(2,'0');
  $('hdr-date').textContent=now.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();
  const p=(now.getHours()*3600+now.getMinutes()*60+now.getSeconds())/86400*100;
  $('day-fill').style.width=p.toFixed(2)+'%';$('day-pct').textContent=p.toFixed(0)+'\u202f%';
  if(manualSession&&now>=manualSession.event.start){endManualSession();return;}
  if(manualSession&&!conflictBannerActive){
    const conflict=events.find(e=>e.id!==manualSession.event.id&&e.start<=now&&e.end>now);
    if(conflict)showConflictBanner(conflict);
  }
  renderCurrentCardAnimated(now);
  renderNextBridge(now);
  if(now.getSeconds()===0){renderSchedule(now);renderPills(now);}
}

function openCal(){buildTimeline();$('cal-overlay').classList.add('open');}
function closeCal(){$('cal-overlay').classList.remove('open');}
function buildTimeline(){
  const inner=$('tl-inner');inner.style.height=((TL_E-TL_S)*PX_H+32)+'px';let html='';
  for(let h=TL_S;h<=TL_E;h++){const y=(h-TL_S)*PX_H;html+=`<div class="tl-hour" style="top:${y}px;"><div class="tl-hlabel">${String(h).padStart(2,'0')}</div><div class="tl-hrule"></div></div>`;}
  const now=new Date();const cols=[];
  const placed=events.map(ev=>{
    const sh=ev.start.getHours()+ev.start.getMinutes()/60,eh=ev.end.getHours()+ev.end.getMinutes()/60;
    let col=0;while(cols[col]!==undefined&&cols[col]>sh+0.001)col++;cols[col]=eh;return{...ev,col,sh,eh};
  });
  const maxCol=Math.max(0,...placed.map(e=>e.col))+1;
  placed.forEach(ev=>{
    const top=(ev.sh-TL_S)*PX_H,height=Math.max(14,(ev.eh-ev.sh)*PX_H-4);
    const isDone=ev.end<=now,isCur=ev.start<=now&&ev.end>now;
    const lOff=maxCol>1?`calc(44px + ${ev.col*(94/maxCol)}%)`:'44px';
    const bg=isDone?'rgba(61,143,96,.09)':isCur?'rgba(210,170,80,.12)':'rgba(80,100,160,.09)';
    const bord=isDone?'rgba(61,143,96,.28)':isCur?'rgba(210,170,80,.42)':'rgba(80,100,160,.2)';
    const tc=isDone?'var(--green)':isCur?'var(--gold)':'rgba(180,190,225,.7)';
    html+=`<div class="tl-block" style="top:${top}px;height:${height}px;left:${lOff};width:${maxCol>1?94/maxCol+'%':'94%'};background:${bg};border:.5px solid ${bord};"><div class="tl-btitle" style="color:${tc};">${esc(ev.title)}</div>${height>26?`<div class="tl-btime">${hm(ev.start)}–${hm(ev.end)}</div>`:''}</div>`;
  });
  const nh=now.getHours()+now.getMinutes()/60;
  if(nh>=TL_S&&nh<=TL_E){const y=(nh-TL_S)*PX_H;html+=`<div class="tl-now-line" style="top:${y}px;"><div class="tl-now-dot"></div><div class="tl-now-rule"></div></div>`;}
  inner.innerHTML=html;$('tl-scroll').scrollTop=Math.max(0,(nh-TL_S)*PX_H-100);
}

async function plannerDateChanged(){
  const dateInput=document.getElementById('pl-date');
  if(!dateInput)return;
  const dateVal=dateInput.value;
  const slotsEl=document.getElementById('pl-slots');
  const loadEl=document.getElementById('pl-slots-loading');

  if(loadEl)loadEl.style.display='flex';
  slotsEl.innerHTML='';
  plannerSelectedSlot=null;
  document.getElementById('pl-reschedule-confirm').innerHTML='';

  try{
    const dayEvents=await fetchEvents(dateVal);
    const slots=computeFreeSlots(dayEvents,ev.end-ev.start,dateVal);
    if(loadEl)loadEl.style.display='none';
    if(slots.length===0){
      slotsEl.innerHTML='<div style="font-family:\'JetBrains Mono\',monospace;font-size:.58rem;color:var(--muted);">Kein freier Slot gefunden. Anderes Datum wählen.</div>';
      return;

    slotsEl.innerHTML=slots.map((s,i)=>`
      <div class="slot-item${plannerSelectedSlot===i?' selected':''}" onclick="selectSlot(${i},${s.start.getTime()},${s.end.getTime()})">

async function confirmReschedule(startMs,endMs){
  const ev=events.find(e=>e.id===plannerSelectedEvId);
  if(!ev){toast('◇','Fehler','Kein Termin gewählt');return;}
  const newStart=new Date(startMs),newEnd=new Date(endMs);
  setStatus('warn','Termin wird verschoben …');
  try{
    const url=`${CAL_API}/calendars/${encodeURIComponent(ev.calId)}/events/${encodeURIComponent(ev.id)}`;
    const full=await apiFetch(url);
    await apiFetch(url,'PATCH',{
      start:{dateTime:newStart.toISOString(),timeZone:full.start.timeZone||'Europe/Berlin'},
      end:  {dateTime:newEnd.toISOString(),  timeZone:full.end.timeZone  ||'Europe/Berlin'}

    await loadData();
    renderPlannerTab();
  }catch(e){
    setStatus('err','Fehler');toast('◇','Fehler beim Verschieben',e.message);
  }
}

async function computeNewPlan(){
  const dateVal=(document.getElementById('pn-date')||{}).value||todayStr();
  const fromVal=(document.getElementById('pn-from')||{}).value||'08:00';
  const prefs=getPrefs();
  const resultEl=document.getElementById('pn-result');
  if(!resultEl)return;
  resultEl.innerHTML='<div class="plan-loading"><div class="plan-spinner"></div>Berechne Plan …</div>';

  try{
    const dayEvents=await fetchEvents(dateVal);
    const [fH,fM]=fromVal.split(':').map(Number);
    const base=new Date(dateVal+'T00:00:00');
    let cursor=new Date(base);cursor.setHours(fH,fM,0,0);
    const [wEH,wEM]=prefs.workEnd.split(':').map(Number);
    const workEnd=new Date(base);workEnd.setHours(wEH,wEM,0,0);
    const minPauseMs=prefs.minPause*60*1000;
    const plan=[];

    for(const item of plannerNewItems){
      const durMs=item.durMin*60*1000;
      // Skip over existing events
      let placed=false;
      for(let attempt=0;attempt<48;attempt++){
        // Check if cursor overlaps any existing event
        const overlap=dayEvents.find(e=>e.start<new Date(cursor.getTime()+durMs)&&e.end>cursor);
        if(overlap){cursor=new Date(overlap.end.getTime()+minPauseMs);continue;}
        // Check workEnd
        if(new Date(cursor.getTime()+durMs)>workEnd){break;}
        plan.push({title:item.title,start:new Date(cursor),end:new Date(cursor.getTime()+durMs),type:'event'});
        cursor=new Date(cursor.getTime()+durMs+minPauseMs);
        placed=true;break;
      }
      if(!placed){plan.push({title:item.title,start:null,end:null,type:'no-slot'});}
    }

    if(plan.length===0){resultEl.innerHTML='<div style="color:var(--muted);font-size:.6rem;font-family:\'JetBrains Mono\',monospace;margin-top:.8rem;">Kein Plan möglich.</div>';return;}

    const dateLbl=new Date(dateVal+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    const rows=plan.map((p,i)=>p.start
      ?`<div class="plan-result-row">
          <div class="plan-result-time">${hm(p.start)} – ${hm(p.end)}</div>
          <div class="plan-result-name">${esc(p.title)}</div>
          <span class="plan-result-badge prb-event">Termin</span>
        </div>`
      :`<div class="plan-result-row">
          <div class="plan-result-time" style="color:var(--red);">Kein Slot</div>
          <div class="plan-result-name">${esc(p.title)}</div>
        </div>`
    ).join('');

    const canCreate=plan.some(p=>p.start);
    resultEl.innerHTML=`
      <div class="plan-result" style="margin-top:.85rem;">
        <div class="plan-result-title">Vorgeschlagener Plan · ${dateLbl}</div>
        ${rows}
      </div>
      ${canCreate?`<div style="margin-top:.85rem;">
        <button class="pf-btn" onclick="createNewPlan(${JSON.stringify(plan.map(p=>p.start?{title:p.title,start:p.start.getTime(),end:p.end.getTime()}:null)).replace(/"/g,'&quot;')})">✓ Alle Termine erstellen</button>
      </div>`:''}`;
  }catch(e){
    resultEl.innerHTML=`<div style="color:var(--red);font-family:'JetBrains Mono',monospace;font-size:.58rem;margin-top:.5rem;">Fehler: ${esc(e.message)}</div>`;
  }
}

async function createNewPlan(planJSON){
  const plan=JSON.parse(planJSON.replace(/&quot;/g,'"'));
  const calId=await getPrimaryCalendarId();
  setStatus('warn','Termine werden erstellt …');
  let created=0;
  for(const p of plan){
    if(!p)continue;
    try{
      await apiFetch(`${CAL_API}/calendars/${encodeURIComponent(calId)}/events`,'POST',{
        summary:p.title,
        start:{dateTime:new Date(p.start).toISOString(),timeZone:'Europe/Berlin'},
        end:  {dateTime:new Date(p.end).toISOString(),  timeZone:'Europe/Berlin'}
      });
      created++;
    }catch(e){console.warn('Create failed:',e.message);}
  }
  toast('✦',`${created} Termin${created!==1?'e':''} erstellt`,'');
  setStatus(true);plannerNewItems=[];await loadData();renderPlannerTab();
}

async function getPrimaryCalendarId(){
  // Use the first non-task calendar that looks like the primary
  const cals=await fetchCalendarList();
  const primary=cals.find(c=>c.id.includes('@')&&!c.id.includes('@resource')&&!c.id.includes('@group')&&!c.id.includes('@tasks'));
  return primary?primary.id:'primary';
}

  };

// ── Free slot calculator ────────────────────────
function computeFreeSlots(dayEvts,neededMs,dateStr){
  const prefs=getPrefs();
  const base=new Date(dateStr+'T00:00:00');
  const [sH,sM]=prefs.workStart.split(':').map(Number);
  const [eH,eM]=prefs.workEnd.split(':').map(Number);
  const wS=new Date(base);wS.setHours(sH,sM,0,0);
  const wE=new Date(base);wE.setHours(eH,eM,0,0);
  const minPauseMs=prefs.minPause*60*1000;
  const sorted=[...dayEvts].sort((a,b)=>a.start-b.start);
  const gaps=[];
  let cursor=wS;
  for(const ev of sorted){
    if(ev.start>cursor&&ev.start-cursor>=neededMs){
      gaps.push({start:new Date(cursor),end:new Date(ev.start)});
    }
    if(ev.end>cursor)cursor=new Date(ev.end.getTime()+minPauseMs);
  }
  if(wE-cursor>=neededMs)gaps.push({start:new Date(cursor),end:new Date(wE)});
  return gaps;
}

// ═══════════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════════
function setStatus(state,msg){
  const dot=$('sdot'),txt=$('stxt');
  if(state===true){dot.className='sdot';txt.textContent='Aktualisiert · '+new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
  else if(state==='warn'){dot.className='sdot warn';txt.textContent=msg||'…';}
  else{dot.className='sdot err';txt.textContent=msg||'Fehler';}
}

// ═══════════════════════════════════════════════════
// DASHBOARD INIT
// ═══════════════════════════════════════════════════
function startDashboard(){
  restoreManualSession(); // restore before first render
  renderAll();tick();if(!clockTmr)clockTmr=setInterval(tick,1000);
  loadData();scheduleTokenRefresh();
  $('cal-btn').onclick=openCal;
  $('planner-btn').onclick=()=>location.href='planner.html';
  $('logout-btn').onclick=()=>{
    clearTimeout(refreshTmr);clearTimeout(tokenRefreshTmr);clearInterval(clockTmr);
    ['fd_tok','fd_tok3','fd_tok4','fd_tok5','fd_client','pending_auth',SK_SESSION].forEach(k=>localStorage.removeItem(k));
    location.reload();
  };
  $('refresh-btn').onclick=async()=>{
    const btn=$('refresh-btn');
    if(btn.classList.contains('login-needed')){
      btn.textContent='…';btn.disabled=true;
      try{const{token:tok,expiresIn:exp}=await doAuth();saveToken(tok,exp);btn.textContent='↻';btn.disabled=false;btn.classList.remove('login-needed');setStatus(true);scheduleTokenRefresh();await loadData();}
      catch{btn.textContent='Anmelden →';btn.disabled=false;}
    }else{loadData();}
  };
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init(){
  lsStart=Date.now();
  const hp=new URLSearchParams(window.location.hash.slice(1)),rt=hp.get('access_token');
  if(rt){
    const exp=parseInt(hp.get('expires_in')||'3600');
    history.replaceState(null,'',window.location.pathname);
    saveToken(rt,exp);localStorage.removeItem('pending_auth');
    await revealApp();startDashboard();return;
  }
  if(tokenValid()){loadToken();await revealApp();startDashboard();return;}
  $('load-txt').textContent='Anmeldung …';
  if(isMobile()){
    await new Promise(r=>setTimeout(r,600));
    ss({pending_auth:'1'});window.location.href=buildAuthUrl();return;
  }
  await revealApp();
  clockTmr=setInterval(tick,1000);tick();
  setStatus('warn','Anmeldung …');
  await new Promise(r=>setTimeout(r,300));
  try{
    const{token:tok,expiresIn:exp}=await doAuth();
    saveToken(tok,exp);$('refresh-btn').classList.remove('login-needed');$('refresh-btn').textContent='↻';
    startDashboard();
  }catch(e){
    setStatus('err',e.message==='popup_blocked'?'Popup erlauben & ↻ klicken':'Anmelden →');
    $('refresh-btn').textContent='Anmelden →';$('refresh-btn').classList.add('login-needed');
    startDashboard();
  }
}

init();
</script>
